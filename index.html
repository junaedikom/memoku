<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoKu - Notepad Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 h-screen w-full overflow-hidden flex">

    <!-- 1. LOADING SCREEN -->
    <div id="loading-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gray-50">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-gray-500 font-medium">Menyiapkan ruang catatan...</p>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="main-screen" class="hidden flex h-full w-full bg-white">
        
        <!-- SIDEBAR -->
        <div id="sidebar" class="flex w-full md:w-80 lg:w-96 flex-col border-r border-gray-200 bg-gray-50 h-full">
            <div class="p-4 bg-white border-b border-gray-200">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-2 text-blue-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                        <h2 class="text-xl font-bold text-gray-800">MemoKu</h2>
                    </div>
                </div>
                
                <div class="relative">
                    <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="search-input" placeholder="Cari catatan..." class="w-full pl-10 pr-4 py-2 bg-gray-100 border-transparent focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 rounded-xl text-sm transition-all outline-none" />
                </div>
            </div>

            <div id="memo-list" class="flex-1 overflow-y-auto divide-y divide-gray-100"></div>

            <div class="p-4 bg-white border-t border-gray-200">
                <button id="add-memo-btn" class="w-full flex items-center justify-center py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium shadow-md shadow-blue-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" class="mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Catatan Baru
                </button>
            </div>
        </div>

        <!-- EDITOR AREA -->
        <div id="editor-area" class="hidden md:flex flex-1 flex-col bg-white h-full relative">
            <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center p-8 bg-gray-50/50 w-full">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-4 text-blue-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/></svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-700 mb-2">Pilih atau Buat Catatan</h2>
                <p class="text-gray-500">Klik salah satu catatan atau buat yang baru untuk mulai menulis.</p>
            </div>

            <div id="active-editor" class="hidden flex-col h-full w-full max-w-4xl mx-auto shadow-sm">
                <div class="flex items-center justify-between p-4 border-b border-gray-100 bg-white">
                    <div class="flex items-center">
                        <button id="back-btn" class="md:hidden p-2 mr-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                        </button>
                        <span id="last-updated-text" class="text-sm text-gray-400 hidden sm:inline-block"></span>
                    </div>
                    
                    <div class="flex items-center space-x-2">
                        <button id="delete-btn" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                        <button id="save-btn" class="flex items-center px-4 py-2 rounded-lg font-medium bg-blue-50 text-blue-700 hover:bg-blue-100 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" class="mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/></svg>
                            <span id="save-btn-text">Simpan</span>
                        </button>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto p-6 md:p-10 flex flex-col">
                    <input type="text" id="memo-title" placeholder="Judul Catatan" class="w-full text-3xl font-bold text-gray-900 border-none outline-none bg-transparent placeholder-gray-300 mb-6 shrink-0" />
                    <textarea id="memo-content" placeholder="Mulai menulis..." class="w-full flex-1 min-h-[400px] text-lg text-gray-700 border-none outline-none resize-none bg-transparent placeholder-gray-300 leading-relaxed"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL HAPUS -->
    <div id="delete-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold text-gray-900 mb-2">Hapus Catatan?</h3>
            <p class="text-gray-500 mb-6">Catatan ini akan hilang selamanya. Kamu yakin?</p>
            <div class="flex justify-end space-x-3">
                <button id="cancel-delete-btn" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-xl font-medium">Batal</button>
                <button id="confirm-delete-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl font-medium">Hapus</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Logika Konfigurasi: Prioritas ke variabel sistem, lalu fallback ke dummy untuk mencegah crash
        let firebaseConfig;
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        } catch (e) {
            firebaseConfig = null;
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-memo-app';

        // Fungsi Tampilkan Error Konfigurasi
        function showFatalError(msg) {
            document.getElementById('loading-screen').innerHTML = `
                <div class="p-8 text-center max-w-md">
                    <div class="text-red-500 font-bold text-xl mb-4">Ralat Konfigurasi</div>
                    <p class="text-gray-600 mb-6">${msg}</p>
                    <div class="text-xs text-gray-400 bg-gray-100 p-4 rounded text-left overflow-auto">
                        Tips: Jika dideploy ke GitHub/Vercel, pastikan objek <b>firebaseConfig</b> sudah diisi dengan data dari Firebase Console anda.
                    </div>
                </div>
            `;
        }

        if (!firebaseConfig || (firebaseConfig.apiKey && firebaseConfig.apiKey.includes("MASUKKAN"))) {
            showFatalError("Kunci API Firebase tidak ditemukan atau belum diatur. Aplikasi tidak dapat terhubung ke database.");
        } else {
            initApp();
        }

        function initApp() {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            let currentUser = null;
            let memos = [];
            let activeMemoId = null;
            let searchQuery = '';

            const elLoading = document.getElementById('loading-screen');
            const elMain = document.getElementById('main-screen');
            const listContainer = document.getElementById('memo-list');
            const inputTitle = document.getElementById('memo-title');
            const inputContent = document.getElementById('memo-content');
            const textLastUpdated = document.getElementById('last-updated-text');
            const btnSave = document.getElementById('save-btn');
            const textSaveBtn = document.getElementById('save-btn-text');

            // --- AUTH ---
            const startAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (err) {
                    showFatalError("Gagal memulai sesi aman: " + err.message);
                }
            };

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    elLoading.classList.add('hidden');
                    elMain.classList.remove('hidden');
                    setupRealtimeData();
                } else {
                    startAuth();
                }
            });

            // --- DATA ---
            function setupRealtimeData() {
                const collectionPath = `artifacts/${appId}/users/${currentUser.uid}/memos`;
                const memosRef = collection(db, collectionPath);
                
                onSnapshot(memosRef, (snapshot) => {
                    memos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    memos.sort((a, b) => b.updatedAt - a.updatedAt);
                    renderList();
                    
                    if (activeMemoId) {
                        const current = memos.find(m => m.id === activeMemoId);
                        if (!current) closeEditor();
                        else if (document.activeElement !== inputTitle && document.activeElement !== inputContent) {
                            updateEditorUI(current);
                        }
                    }
                }, (err) => console.error("Firestore Error:", err));
            }

            function renderList() {
                listContainer.innerHTML = '';
                const filtered = memos.filter(m => 
                    (m.title || '').toLowerCase().includes(searchQuery.toLowerCase()) || 
                    (m.content || '').toLowerCase().includes(searchQuery.toLowerCase())
                );

                if (filtered.length === 0) {
                    listContainer.innerHTML = `<div class="p-8 text-center text-gray-400 text-sm">Tidak ada catatan.</div>`;
                    return;
                }

                filtered.forEach(m => {
                    const div = document.createElement('div');
                    const activeClass = activeMemoId === m.id ? 'bg-blue-50 border-l-4 border-blue-500' : 'border-l-4 border-transparent';
                    div.className = `p-4 cursor-pointer hover:bg-gray-50 transition-colors ${activeClass}`;
                    div.innerHTML = `
                        <div class="font-bold truncate">${m.title || 'Tanpa Judul'}</div>
                        <div class="text-sm text-gray-500 line-clamp-2 mt-1">${m.content || '...'}</div>
                        <div class="text-[10px] text-gray-400 mt-2">${new Date(m.updatedAt).toLocaleDateString('id-ID')}</div>
                    `;
                    div.onclick = () => openEditor(m.id);
                    listContainer.appendChild(div);
                });
            }

            async function openEditor(id) {
                activeMemoId = id;
                const memo = memos.find(m => m.id === id);
                updateEditorUI(memo);
                
                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('active-editor').classList.remove('hidden');
                document.getElementById('active-editor').classList.add('flex');
                
                if (window.innerWidth < 768) {
                    document.getElementById('sidebar').classList.add('hidden');
                    document.getElementById('editor-area').classList.remove('hidden');
                }
                renderList();
            }

            function updateEditorUI(memo) {
                if (!memo) return;
                inputTitle.value = memo.title || '';
                inputContent.value = memo.content || '';
                textLastUpdated.textContent = `Update: ${new Date(memo.updatedAt).toLocaleTimeString('id-ID')}`;
            }

            function closeEditor() {
                activeMemoId = null;
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('active-editor').classList.add('hidden');
                if (window.innerWidth < 768) {
                    document.getElementById('sidebar').classList.remove('hidden');
                    document.getElementById('editor-area').classList.add('hidden');
                }
                renderList();
            }

            // --- ACTIONS ---
            document.getElementById('add-memo-btn').onclick = async () => {
                const ref = collection(db, `artifacts/${appId}/users/${currentUser.uid}/memos`);
                const docRef = await addDoc(ref, { 
                    title: '', content: '', createdAt: Date.now(), updatedAt: Date.now() 
                });
                openEditor(docRef.id);
                searchQuery = '';
                document.getElementById('search-input').value = '';
            };

            btnSave.onclick = async () => {
                if (!activeMemoId) return;
                textSaveBtn.textContent = 'Menyimpan...';
                const ref = doc(db, `artifacts/${appId}/users/${currentUser.uid}/memos`, activeMemoId);
                await updateDoc(ref, {
                    title: inputTitle.value,
                    content: inputContent.value,
                    updatedAt: Date.now()
                });
                textSaveBtn.textContent = 'Tersimpan';
                setTimeout(() => textSaveBtn.textContent = 'Simpan', 1000);
            };

            document.getElementById('delete-btn').onclick = () => document.getElementById('delete-modal').classList.remove('hidden');
            document.getElementById('cancel-delete-btn').onclick = () => document.getElementById('delete-modal').classList.add('hidden');
            document.getElementById('confirm-delete-btn').onclick = async () => {
                if (!activeMemoId) return;
                await deleteDoc(doc(db, `artifacts/${appId}/users/${currentUser.uid}/memos`, activeMemoId));
                document.getElementById('delete-modal').classList.add('hidden');
                closeEditor();
            };

            document.getElementById('back-btn').onclick = closeEditor;
            document.getElementById('search-input').oninput = (e) => {
                searchQuery = e.target.value;
                renderList();
            };
        }
    </script>
</body>
</html>
